name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to release
        required: true
        type: string

permissions:
  contents: read

jobs:
  build-bundles:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Linux system packages
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y portaudio19-dev python3-tk flatpak flatpak-builder
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O "$RUNNER_TEMP/appimagetool.AppImage"
          chmod +x "$RUNNER_TEMP/appimagetool.AppImage"

      - name: Install macOS system packages
        if: runner.os == 'macOS'
        run: brew install portaudio

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build application bundle
        run: python build-pyjippety-bundle.py

      - name: Package release artifacts
        env:
          APPIMAGETOOL: ${{ runner.os == 'Linux' && format('{0}/appimagetool.AppImage', runner.temp) || '' }}
        run: python package-pyjippety.py

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: pyjippety-bundle-${{ runner.os }}-${{ runner.arch }}
          path: release/*

  build-python-dists:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build wheel and sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload Python distributions
        uses: actions/upload-artifact@v4
        with:
          name: pyjippety-python-dists
          path: dist/*

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-bundles
      - build-python-dists
    permissions:
      contents: write

    steps:
      - name: Download bundled artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: pyjippety-bundle-*
          path: release-assets
          merge-multiple: true

      - name: Download Python distributions
        uses: actions/download-artifact@v5
        with:
          name: pyjippety-python-dists
          path: release-assets

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release-assets/* --clobber
          else
            gh release create "$RELEASE_TAG" release-assets/* --title "$RELEASE_TAG" --generate-notes
          fi
